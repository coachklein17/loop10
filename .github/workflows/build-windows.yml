name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch webview vendor
        shell: bash
        run: |
          if [[ ! -f vendor/webview/CMakeLists.txt ]]; then
            mkdir -p vendor
            git clone --depth 1 https://github.com/webview/webview.git vendor/webview
          fi

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: cmake -S desktop -B desktop/build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: cmake --build desktop/build

      - name: Package
        shell: pwsh
        run: |
          if (Test-Path "desktop/build/loop10.exe") {
            $exeDir = "desktop/build"
          } elseif (Test-Path "desktop/build/Release/loop10.exe") {
            $exeDir = "desktop/build/Release"
          } else {
            Write-Error "loop10.exe not found"
            Get-ChildItem -Recurse desktop/build -Filter loop10.exe
            exit 1
          }
          if (-not (Test-Path "$exeDir/ui")) {
            Write-Error "ui/ folder missing next to loop10.exe"
            exit 1
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "$exeDir/loop10.exe" dist/
          Copy-Item "$exeDir/ui" dist/ui -Recurse
          Compress-Archive -Path "dist/loop10.exe", "dist/ui" -DestinationPath loop10-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: loop10-windows
          path: loop10-windows.zip
          retention-days: 30
